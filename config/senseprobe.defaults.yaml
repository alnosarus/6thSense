# SenseProbe defaults — copy to config/senseprobe.local.yaml (gitignored) or set
# SENSEPROBE_CONFIG=/path/to/overrides.yaml. Env vars override paths and active dataset.

defaults:
  # Active dataset id (see `datasets`); override with SENSEPROBE_DATASET
  dataset: tuffc_2022

paths:
  # Relative to repo root unless absolute. Override with SENSEPROBE_DATA_ROOT, etc.
  data_root: data
  results: results
  models: models

datasets:
  tuffc_2022:
    label: "TUFFC 2022 bi-directional elastography (CIRS phantom)"
    # scripts/setup_data.py extracts the zip under data/raw/<raw_slug>/
    raw_slug: tuffc_2022_bi_directional_elasto
    # Path inside that folder to the directory containing Data_*.mat
    raw_extracted_subpath: TUFFC_2022_Bi_Directional_elasto/extracted
    # Subdirs under data_root for npz outputs (add more datasets with their own keys)
    outputs:
      processed: processed
      processed_full: processed_full

  # Example second dataset (uncomment and fill when you add one):
  # acme_phantom_v1:
  #   label: "Example phantom"
  #   raw_slug: acme_phantom_v1
  #   raw_extracted_subpath: extracted
  #   outputs:
  #     processed: processed/acme_phantom_v1
  #     processed_full: processed_full/acme_phantom_v1

training:
  # ml/experiment.py (lighter sweep)
  experiment_classifiers:
    - SimpleCNN
    - ResNet18
    - EfficientNet-B0
  # Image-level classifiers to run in research.py (subset of implemented factories)
  classifiers:
    - SimpleCNN
    - ResNet18
    - ResNet50
    - EfficientNet-B0
    - ConvNeXt-Tiny
  # U-Net variants in research.py
  unets:
    - UNet
    - ResUNet
