<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" role="img" aria-label="Software dashboard placeholder">
  <g fill="none" stroke="#736A3C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Laptop lid (screen) -->
    <path d="M 110 300 L 430 300 L 430 612 L 110 612 Z" />
    <!-- Screen inner bezel -->
    <path d="M 128 318 L 412 318 L 412 594 L 128 594 Z" stroke-width="1.5" />
    <!-- Camera dot -->
    <circle cx="270" cy="308" r="2" fill="#736A3C" stroke="none" />
    <!-- Laptop base (keyboard deck) -->
    <path d="M 86 612 L 454 612 L 470 664 L 70 664 Z" />
    <!-- Trackpad / front lip hint -->
    <line x1="230" y1="644" x2="310" y2="644" />
    <!-- Dashboard content inside screen -->
    <!-- Top bar: app title + status -->
    <line x1="146" y1="338" x2="228" y2="338" stroke-width="3" />
    <line x1="146" y1="350" x2="196" y2="350" stroke-width="1.5" />
    <circle cx="398" cy="342" r="4" />
    <!-- Chart grid -->
    <line x1="148" y1="468" x2="394" y2="468" stroke-width="1" stroke-dasharray="3 4" />
    <line x1="148" y1="432" x2="394" y2="432" stroke-width="1" stroke-dasharray="3 4" />
    <line x1="148" y1="396" x2="394" y2="396" stroke-width="1" stroke-dasharray="3 4" />
    <!-- Bar chart: force / contact over time -->
    <rect x="152" y="440" width="18" height="28" />
    <rect x="176" y="420" width="18" height="48" />
    <rect x="200" y="402" width="18" height="66" />
    <rect x="224" y="388" width="18" height="80" />
    <rect x="248" y="398" width="18" height="70" />
    <rect x="272" y="416" width="18" height="52" />
    <rect x="296" y="428" width="18" height="40" />
    <rect x="320" y="442" width="18" height="26" />
    <rect x="344" y="420" width="18" height="48" />
    <rect x="368" y="406" width="18" height="62" />
    <!-- X-axis -->
    <line x1="148" y1="478" x2="394" y2="478" stroke-width="2" />
    <!-- Timeline scrub row -->
    <line x1="148" y1="516" x2="394" y2="516" />
    <circle cx="246" cy="516" r="5" />
    <!-- Meta label pair bottom -->
    <line x1="148" y1="548" x2="202" y2="548" stroke-width="1.5" />
    <line x1="148" y1="560" x2="236" y2="560" stroke-width="1.5" />
    <line x1="292" y1="548" x2="346" y2="548" stroke-width="1.5" />
    <line x1="292" y1="560" x2="378" y2="560" stroke-width="1.5" />
  </g>
</svg>
